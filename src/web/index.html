<!DOCTYPE html>
<html lang="zh-CN" data-device="unknown">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>数智鸿居 - 智能家居</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F3E0;</text></svg>" />
    <script>
      // Inline device-class tag before any rendering to prevent flash
      (function(){
        var w = window.innerWidth;
        var cls = w >= 768 ? 'desktop' : 'mobile';
        document.documentElement.className = cls;
        document.documentElement.setAttribute('data-device', cls);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
